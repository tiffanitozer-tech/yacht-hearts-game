<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yacht Hearts</title>
  <style>
    :root {
      --navy: #071a33;
      --blue: #1f6fae;
      --sky: #dff3ff;
      --cream: #fff8ef;
      --gold: #d7a84f;
      --pink: #f76f9b;
      --coral: #ff8066;
      --white: #ffffff;
      --soft: rgba(255,255,255,.78);
      --shadow: 0 18px 45px rgba(0,0,0,.22);
      --radius: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.8), transparent 28%),
        linear-gradient(160deg, #6ed5ff 0%, #1f6fae 42%, #071a33 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .phone {
      width: min(430px, 100%);
      min-height: 820px;
      max-height: 95vh;
      overflow: hidden;
      border-radius: 38px;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,248,239,.95));
      box-shadow: var(--shadow);
      border: 8px solid rgba(255,255,255,.55);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 18px 20px 12px;
      background: linear-gradient(90deg, var(--navy), #123f73);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 23px;
      letter-spacing: .3px;
    }

    .brand span {
      font-size: 12px;
      opacity: .78;
    }

    .stat-pill {
      background: rgba(255,255,255,.16);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      padding: 18px;
      overflow-y: auto;
      flex: 1;
    }

    .hero {
      min-height: 260px;
      border-radius: var(--radius);
      padding: 24px;
      background:
        linear-gradient(rgba(7,26,51,.18), rgba(7,26,51,.62)),
        url("https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: end;
      box-shadow: 0 12px 30px rgba(7,26,51,.18);
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1;
    }

    .hero p {
      margin: 0;
      opacity: .94;
      font-size: 15px;
    }

    .card {
      background: var(--soft);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 14px;
      box-shadow: 0 8px 22px rgba(7,26,51,.08);
    }

    .scene-title {
      font-size: 24px;
      margin: 0 0 10px;
    }

    .scene-text {
      font-size: 17px;
      line-height: 1.48;
      white-space: pre-line;
    }

    .choice {
      width: 100%;
      border: 0;
      padding: 15px 16px;
      margin-top: 10px;
      border-radius: 18px;
      background: linear-gradient(90deg, #fff, #fff5fa);
      color: var(--navy);
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(7,26,51,.08);
      cursor: pointer;
    }

    .choice:hover {
      transform: translateY(-1px);
    }

    .choice .tag {
      display: block;
      color: #a5556b;
      font-size: 12px;
      margin-top: 3px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid rgba(7,26,51,.16);
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      margin-top: 10px;
      outline: none;
      background: white;
    }

    .primary {
      width: 100%;
      border: 0;
      margin-top: 14px;
      padding: 15px;
      border-radius: 18px;
      font-weight: 800;
      color: white;
      background: linear-gradient(90deg, var(--pink), var(--coral));
      box-shadow: 0 9px 20px rgba(247,111,155,.3);
      cursor: pointer;
      font-size: 16px;
    }

    .secondary {
      width: 100%;
      border: 1px solid rgba(7,26,51,.12);
      margin-top: 10px;
      padding: 13px;
      border-radius: 18px;
      font-weight: 750;
      color: var(--navy);
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    .outfit-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .outfit {
      border: 1px solid rgba(7,26,51,.1);
      background: white;
      border-radius: 22px;
      padding: 15px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(7,26,51,.06);
    }

    .outfit.selected {
      outline: 3px solid var(--pink);
    }

    .outfit h3 {
      margin: 0 0 5px;
    }

    .outfit p {
      margin: 0;
      color: rgba(7,26,51,.75);
      line-height: 1.35;
    }

    .meters {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .meter-name {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(7,26,51,.1);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--pink));
      border-radius: 999px;
      width: 0%;
      transition: width .35s ease;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      padding: 12px 18px 18px;
      background: rgba(255,248,239,.78);
    }

    .footer-actions button {
      flex: 1;
      border: 0;
      border-radius: 15px;
      padding: 12px;
      font-weight: 800;
      background: rgba(7,26,51,.08);
      color: var(--navy);
      cursor: pointer;
    }

    .mini {
      font-size: 13px;
      opacity: .72;
      line-height: 1.35;
    }

    .confessional {
      border-left: 4px solid var(--pink);
      padding-left: 12px;
      font-style: italic;
      color: rgba(7,26,51,.82);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div class="brand">
        <h1>Yacht Hearts</h1>
        <span>All choices unlocked</span>
      </div>
      <div class="stat-pill" id="topStatus">Bombshell Mode</div>
    </div>

    <main id="app"></main>

    <div class="footer-actions">
      <button onclick="showStats()">Stats</button>
      <button onclick="saveGame()">Save</button>
      <button onclick="resetGame()">Reset</button>
    </div>
  </div>

  <script>
    const outfits = [
      {
        id: "white_siren",
        name: "The White Siren 🤍",
        desc: "A white silk cutout dress, gold jewelry, glossy skin, soft beach waves.",
        effects: { attraction: 2, elegance: 2 }
      },
      {
        id: "red_bombshell",
        name: "Mediterranean Bombshell ❤️",
        desc: "A red body-hugging dress with a dramatic slit, bronzed makeup, gold hoops.",
        effects: { attraction: 3, drama: 1 }
      },
      {
        id: "yacht_princess",
        name: "Yacht Club Princess 💙",
        desc: "A navy-and-white linen set, oversized sunglasses, gold sandals, rich-girl energy.",
        effects: { mystery: 2, elegance: 2 }
      },
      {
        id: "sunset_goddess",
        name: "Sunset Goddess ✨",
        desc: "A champagne shimmer mini dress that catches the sunset every time you move.",
        effects: { attraction: 2, flirt: 2 }
      },
      {
        id: "black_card",
        name: "Black Card Babe 🖤",
        desc: "A black plunge halter dress, slick bun, diamond studs, and a look that says trouble.",
        effects: { confidence: 2, drama: 2 }
      }
    ];

    const characters = {
      Luca: { name: "Luca", role: "the charming troublemaker", score: 55 },
      Saint: { name: "Saint", role: "the quiet luxury heir", score: 45 },
      Nico: { name: "Nico", role: "the flirty deckhand with dangerous eyes", score: 50 },
      Theo: { name: "Theo", role: "the sweet golden retriever", score: 40 },
      Cassia: { name: "Cassia", role: "the villa queen who does not share attention", score: 25 }
    };

    const scenes = {
      intro: {
        title: "Episode 1: The Arrival",
        text: (s) => `The helicopter circles the yacht while champagne sparkles on the upper deck.

The host smiles at you.

“Ready to ruin a few couples, ${s.name || "Bombshell"}?”

Before you step out, choose your entrance look.`,
        type: "outfit"
      },

      deck_arrival: {
        title: "All Eyes On You",
        text: (s) => `You step onto the deck in ${getOutfitName(s.outfit)}.

The talking stops.

Luca lowers his sunglasses. Saint goes completely still. Nico actually laughs under his breath like he knows the game just changed.

Cassia, currently wrapped around Luca’s arm, whispers, “Oh, she is not subtle.”

The host grins.

“Boys, step forward if you’d like a date with our new bombshell.”

Every. Single. One. Steps forward.`,
        choices: [
          {
            label: "Smile and say, “Good. I hate choosing from a small menu.”",
            tag: "Confident, funny, everyone laughs",
            next: "first_pick",
            effects: { confidence: 2, popularity: 1, Luca: 5, Nico: 5 }
          },
          {
            label: "Look straight at Luca and say, “You can step closer.”",
            tag: "Bold, messy, Cassia notices",
            next: "luca_heat",
            effects: { drama: 2, Luca: 12, Cassia: -8 }
          },
          {
            label: "Walk past them and let Saint kiss your hand.",
            tag: "Classy, intimate, quiet luxury",
            next: "saint_intro",
            effects: { mystery: 2, Saint: 12 }
          },
          {
            label: "Ask the host, “Can I take two on a date?”",
            tag: "Bombshell chaos",
            next: "double_date",
            effects: { drama: 2, popularity: 1, attraction: 1 }
          }
        ]
      },

      first_pick: {
        title: "The First Choice",
        text: (s) => `The boys laugh, but it is the nervous kind.

The host says, “${s.name}, choose one islander for a private champagne date on the bow.”

Luca gives you a shameless smile.
Saint watches like he already knows your answer.
Nico mouths, “Pick me.”
Theo looks genuinely hopeful.`,
        choices: [
          { label: "Pick Luca", tag: "Chemistry and immediate drama", next: "luca_date", effects: { Luca: 12, Cassia: -5, drama: 1 } },
          { label: "Pick Saint", tag: "Slow-burn luxury romance", next: "saint_date", effects: { Saint: 12, mystery: 1 } },
          { label: "Pick Nico", tag: "Sexy banter and trouble", next: "nico_date", effects: { Nico: 12, flirt: 2 } },
          { label: "Pick Theo", tag: "Sweet boy, protective energy", next: "theo_date", effects: { Theo: 12, popularity: 1 } }
        ]
      },

      luca_heat: {
        title: "Luca Steps Closer",
        text: (s) => `Luca steps out of the lineup and walks toward you like Cassia is not standing right there.

“You sure about that?” he asks.

You smile. “I don’t say things I don’t mean.”

Cassia lets out a tiny laugh, but her jaw is tight.

The host fans herself with the cue card. “Well. That escalated.”`,
        choices: [
          { label: "Let Luca kiss your cheek", tag: "Flirty and public", next: "luca_date", effects: { Luca: 10, drama: 2, attraction: 1 } },
          { label: "Tell Cassia, “Don’t worry, I’ll return him… maybe.”", tag: "Main character villain era", next: "first_pick", effects: { drama: 3, Cassia: -10, popularity: -1 } },
          { label: "Back off with a wink and make him chase you", tag: "Power move", next: "first_pick", effects: { mystery: 2, Luca: 6, confidence: 1 } }
        ]
      },

      saint_intro: {
        title: "Saint’s Hand Kiss",
        text: (s) => `Saint takes your hand and presses a kiss just above your knuckles.

It is calm. Expensive. Almost too smooth.

“You’re trouble,” he says softly.

You tilt your head. “And you like trouble?”

His smile is tiny. “I like rare things.”`,
        choices: [
          { label: "Say, “Then earn my attention.”", tag: "Elegant but dominant", next: "saint_date", effects: { Saint: 12, confidence: 1 } },
          { label: "Brush your thumb over his hand before pulling away", tag: "Quiet chemistry", next: "first_pick", effects: { Saint: 8, mystery: 2 } },
          { label: "Turn to the group and say, “Anyone else this brave?”", tag: "Keeps everyone wanting you", next: "first_pick", effects: { popularity: 1, attraction: 1 } }
        ]
      },

      double_date: {
        title: "Two Dates, One Bombshell",
        text: (s) => `The host blinks. “That’s not usually how this works.”

You shrug. “Then it should be.”

The producers whisper frantically, and then the host smiles.

“Fine. Choose two boys for a sunset speed date.”`,
        choices: [
          { label: "Choose Luca and Saint", tag: "Drama vs luxury", next: "two_date_luca_saint", effects: { Luca: 8, Saint: 8, drama: 2 } },
          { label: "Choose Nico and Theo", tag: "Bad idea vs good idea", next: "two_date_nico_theo", effects: { Nico: 8, Theo: 8, flirt: 1 } },
          { label: "Choose Luca and Nico", tag: "Pure chaos", next: "two_date_luca_nico", effects: { Luca: 8, Nico: 8, drama: 3 } }
        ]
      },

      luca_date: {
        title: "Champagne With Luca",
        text: (s) => `Luca pours champagne like he is trying to impress you and annoy Cassia from across the deck.

“You always get what you want?” he asks.

You look at him over your glass.

The sun hits the water. His knee brushes yours. He does not move it.`,
        choices: [
          { label: "Say, “Usually. Are you offering?”", tag: "Sexy banter", next: "night_party", effects: { Luca: 10, flirt: 2 } },
          { label: "Ask if he actually likes Cassia", tag: "Get the truth", next: "night_party", effects: { Luca: 4, drama: 1 } },
          { label: "Lean close and whisper, “You’re making this too easy.”", tag: "High tension", next: "night_party", effects: { Luca: 12, attraction: 1, drama: 1 } }
        ]
      },

      saint_date: {
        title: "The Bow With Saint",
        text: (s) => `Saint chooses the quietest spot on the yacht, away from the cameras.

Almost.

He hands you champagne and looks at you like he is studying a painting.

“You like being wanted,” he says.

You smile. “I like being chosen correctly.”`,
        choices: [
          { label: "Say, “So choose correctly.”", tag: "Powerful slow burn", next: "night_party", effects: { Saint: 12, confidence: 1 } },
          { label: "Ask why he came on the show", tag: "Emotional route", next: "night_party", effects: { Saint: 8, romance: 2 } },
          { label: "Tell him he looks like he has secrets", tag: "Mysterious chemistry", next: "night_party", effects: { Saint: 10, mystery: 2 } }
        ]
      },

      nico_date: {
        title: "Nico’s Trouble Smile",
        text: (s) => `Nico takes you to the side deck where the cameras have to chase you.

“You’re dangerous,” he says.

“You’re excited,” you answer.

He grins. “Both can be true.”

The wind catches your hair, and he reaches up like he might tuck it behind your ear.`,
        choices: [
          { label: "Let him fix your hair and hold eye contact", tag: "Electric", next: "night_party", effects: { Nico: 12, flirt: 2 } },
          { label: "Tease him: “You flirt like this with everyone?”", tag: "Playful", next: "night_party", effects: { Nico: 8, popularity: 1 } },
          { label: "Step back and say, “Try harder.”", tag: "Make him chase", next: "night_party", effects: { Nico: 10, confidence: 1 } }
        ]
      },

      theo_date: {
        title: "Theo’s Honest Smile",
        text: (s) => `Theo looks nervous in a way that feels real.

“I know everyone is trying to act cool,” he says, “but you kind of knocked the air out of the place.”

It is sweet. Maybe too sweet.

Or maybe exactly what you need after all the ego on this yacht.`,
        choices: [
          { label: "Tell him he’s cute when he’s honest", tag: "Sweet flirt", next: "night_party", effects: { Theo: 12, romance: 1 } },
          { label: "Ask if he can handle a girl like you", tag: "Test him", next: "night_party", effects: { Theo: 8, confidence: 1 } },
          { label: "Keep him as a safe option for later", tag: "Strategic", next: "night_party", effects: { Theo: 4, mystery: 1 } }
        ]
      },

      two_date_luca_saint: {
        title: "Luca vs Saint",
        text: (s) => `You sit between Luca and Saint as the yacht cuts through gold water.

Luca flirts loudly. Saint barely says anything, but somehow it feels louder.

Luca asks, “So what’s your type?”

Saint looks at you. “She doesn’t have a type. She has standards.”`,
        choices: [
          { label: "Side with Saint: “Exactly.”", tag: "Saint wins the moment", next: "night_party", effects: { Saint: 10, Luca: -2 } },
          { label: "Touch Luca’s arm and say, “Confident.”", tag: "Luca wins the moment", next: "night_party", effects: { Luca: 10, drama: 1 } },
          { label: "Say, “Convince me separately.”", tag: "Main character", next: "night_party", effects: { Luca: 5, Saint: 5, confidence: 1 } }
        ]
      },

      two_date_nico_theo: {
        title: "Bad Idea, Good Idea",
        text: (s) => `Nico is all smirks and heat. Theo is soft eyes and actual questions.

Nico says, “I think you like trouble.”

Theo says, “I think you deserve someone who can keep up without playing games.”

Two very different offers.`,
        choices: [
          { label: "Choose Nico’s trouble", tag: "Fun and flirty", next: "night_party", effects: { Nico: 10, flirt: 2 } },
          { label: "Choose Theo’s honesty", tag: "Sweet route", next: "night_party", effects: { Theo: 10, romance: 2 } },
          { label: "Tell them both they’re right", tag: "Keep both doors open", next: "night_party", effects: { Nico: 5, Theo: 5, drama: 1 } }
        ]
      },

      two_date_luca_nico: {
        title: "Pure Chaos",
        text: (s) => `Luca and Nico immediately start competing.

Nico says, “I’d steal you properly.”

Luca laughs. “From who? She’s not yours.”

You take one sip of champagne and let them embarrass themselves beautifully.`,
        choices: [
          { label: "Tell Nico, “I like a man with a plan.”", tag: "Nico route", next: "night_party", effects: { Nico: 10, Luca: -2 } },
          { label: "Tell Luca, “Careful, you sound jealous.”", tag: "Luca route", next: "night_party", effects: { Luca: 10, drama: 1 } },
          { label: "Say, “Fight harder. I’m not impressed yet.”", tag: "Bombshell chaos", next: "night_party", effects: { Luca: 5, Nico: 5, drama: 2, confidence: 1 } }
        ]
      },

      night_party: {
        title: "Tonight’s Party",
        text: (s) => `That night, the yacht becomes all blue lighting, music, bare shoulders, and champagne.

Your arrival has completely changed the mood.

Cassia watches you from the bar.
Luca keeps finding reasons to pass near you.
Saint saves you a seat.
Nico has already told three people he is “just being friendly,” which means he absolutely is not.
Theo smiles every time you look his way.

A producer pulls you aside for your confessional.`,
        choices: [
          { label: "Confessional: “I didn’t come here to be background decor.”", tag: "Main character", next: "party_choice", effects: { popularity: 1, confidence: 1 } },
          { label: "Confessional: “I feel bad… but not bad enough to stop.”", tag: "Flirty villain", next: "party_choice", effects: { drama: 1, flirt: 1 } },
          { label: "Confessional: “I actually want something real, but I can still have fun.”", tag: "Romance route", next: "party_choice", effects: { romance: 2 } }
        ]
      },

      party_choice: {
        title: "Choose Your Night Move",
        text: (s) => `The music drops lower. The cameras pull closer.

This is the kind of moment people replay later.

Who do you pull for a private chat?`,
        choices: [
          { label: "Pull Luca behind the bar", tag: "Risky because Cassia can see", next: "end_teaser", effects: { Luca: 10, drama: 2 } },
          { label: "Ask Saint to show you the upper deck", tag: "Private luxury slow-burn", next: "end_teaser", effects: { Saint: 10, mystery: 1 } },
          { label: "Dance with Nico", tag: "Very flirty, very obvious", next: "end_teaser", effects: { Nico: 10, flirt: 2 } },
          { label: "Sit with Theo and let the boys wonder", tag: "Sweet but strategic", next: "end_teaser", effects: { Theo: 10, popularity: 1 } },
          { label: "Stay with the girls and charm them first", tag: "Protect your popularity", next: "end_teaser", effects: { popularity: 2, Cassia: 3 } }
        ]
      },

      end_teaser: {
        title: "End of Episode 1",
        text: (s) => `By midnight, everyone has an opinion about you.

Some want you.
Some fear you.
Some are pretending they do not care.

Then the host appears with a gold envelope.

“Islanders, tonight there will be a recoupling. And ${s.name} will choose first.”

TO BE CONTINUED...`,
        choices: [
          { label: "View my stats", tag: "See who wants you most", next: "stats" },
          { label: "Restart Episode 1", tag: "Try another route", next: "intro_reset" }
        ]
      }
    };

    let state = {
      name: "",
      outfit: null,
      currentScene: "setup",
      stats: {
        popularity: 5,
        attraction: 5,
        confidence: 5,
        drama: 1,
        flirt: 3,
        mystery: 2,
        elegance: 2,
        romance: 1
      },
      relationships: JSON.parse(JSON.stringify(characters))
    };

    function loadSaved() {
      const saved = localStorage.getItem("yachtHeartsSave");
      if (saved) {
        try { state = JSON.parse(saved); } catch(e) {}
      }
    }

    function saveGame() {
      localStorage.setItem("yachtHeartsSave", JSON.stringify(state));
      alert("Saved. Your bombshell era is safe.");
    }

    function resetGame() {
      if (!confirm("Reset your game?")) return;
      localStorage.removeItem("yachtHeartsSave");
      state = {
        name: "",
        outfit: null,
        currentScene: "setup",
        stats: {
          popularity: 5,
          attraction: 5,
          confidence: 5,
          drama: 1,
          flirt: 3,
          mystery: 2,
          elegance: 2,
          romance: 1
        },
        relationships: JSON.parse(JSON.stringify(characters))
      };
      render();
    }

    function startGame() {
      const name = document.getElementById("nameInput").value.trim();
      state.name = name || "Tiffani";
      state.currentScene = "intro";
      render();
    }

    function selectOutfit(id) {
      state.outfit = id;
      const outfit = outfits.find(o => o.id === id);
      applyEffects(outfit.effects || {});
      state.currentScene = "deck_arrival";
      render();
    }

    function applyEffects(effects = {}) {
      Object.entries(effects).forEach(([key, val]) => {
        if (state.stats[key] !== undefined) {
          state.stats[key] = Math.max(0, Math.min(10, state.stats[key] + val));
        } else if (state.relationships[key]) {
          state.relationships[key].score = Math.max(0, Math.min(100, state.relationships[key].score + val));
        }
      });
    }

    function choose(choice) {
      applyEffects(choice.effects);
      if (choice.next === "intro_reset") {
        state.currentScene = "intro";
        state.outfit = null;
      } else if (choice.next === "stats") {
        showStats();
        return;
      } else {
        state.currentScene = choice.next;
      }
      render();
    }

    function getOutfitName(id) {
      const outfit = outfits.find(o => o.id === id);
      return outfit ? outfit.name : "your entrance look";
    }

    function meter(label, value, max = 10) {
      const pct = Math.max(0, Math.min(100, (value / max) * 100));
      return `
        <div>
          <div class="meter-name"><span>${label}</span><span>${value}/${max}</span></div>
          <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        </div>
      `;
    }

    function relationshipMeter(person) {
      const pct = Math.max(0, Math.min(100, person.score));
      return `
        <div>
          <div class="meter-name"><span>${person.name} — ${person.role}</span><span>${person.score}%</span></div>
          <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        </div>
      `;
    }

    function showStats() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="card">
          <h2 class="scene-title">Your Bombshell Stats</h2>
          <div class="meters">
            ${Object.entries(state.stats).map(([k,v]) => meter(k[0].toUpperCase() + k.slice(1), v)).join("")}
          </div>
        </div>
        <div class="card">
          <h2 class="scene-title">Relationship Meters</h2>
          <div class="meters">
            ${Object.values(state.relationships).map(relationshipMeter).join("")}
          </div>
          <button class="primary" onclick="render()">Back to Story</button>
        </div>
      `;
    }

    function renderSetup() {
      document.getElementById("topStatus").textContent = "New Game";
      return `
        <div class="hero">
          <h2>Yacht Hearts</h2>
          <p>A luxury dating show where you are the bombshell everyone wants.</p>
        </div>
        <div class="card">
          <h2 class="scene-title">Create Your Bombshell</h2>
          <p class="scene-text">Enter your character name. Every choice is unlocked. No gems. No paywalls. Just drama.</p>
          <input id="nameInput" placeholder="Character name" value="${state.name || ""}" />
          <button class="primary" onclick="startGame()">Board the Yacht</button>
          <p class="mini">Tip: Open this file on your phone and use Share → Add to Home Screen to make it feel like an app.</p>
        </div>
      `;
    }

    function renderOutfitScene(scene) {
      document.getElementById("topStatus").textContent = `${state.name || "Bombshell"} • Outfit`;
      return `
        <div class="card">
          <h2 class="scene-title">${scene.title}</h2>
          <p class="scene-text">${scene.text(state)}</p>
        </div>
        <div class="card">
          <h2 class="scene-title">Choose Your Entrance Outfit</h2>
          <div class="outfit-grid">
            ${outfits.map(o => `
              <div class="outfit ${state.outfit === o.id ? "selected" : ""}" onclick="selectOutfit('${o.id}')">
                <h3>${o.name}</h3>
                <p>${o.desc}</p>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderScene(scene) {
      document.getElementById("topStatus").textContent = `${state.name || "Bombshell"} • Episode 1`;
      const text = typeof scene.text === "function" ? scene.text(state) : scene.text;
      return `
        <div class="card">
          <h2 class="scene-title">${scene.title}</h2>
          <p class="scene-text">${text}</p>
        </div>
        <div class="card">
          ${(scene.choices || []).map(c => `
            <button class="choice" onclick='choose(${JSON.stringify(c).replace(/'/g, "&apos;")})'>
              ${c.label}
              ${c.tag ? `<span class="tag">${c.tag}</span>` : ""}
            </button>
          `).join("")}
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (state.currentScene === "setup") {
        app.innerHTML = renderSetup();
        return;
      }

      const scene = scenes[state.currentScene] || scenes.intro;
      if (scene.type === "outfit") {
        app.innerHTML = renderOutfitScene(scene);
      } else {
        app.innerHTML = renderScene(scene);
      }
    }

    loadSaved();
    render();
  </script>
</body>
</html>
